<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymLog — Tu Diario de Entrenamiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- PANTALLA: INICIO -->
  <div id="screen-home" class="screen active">
    <div class="home-bg">
      <div class="noise-overlay"></div>
      <div class="home-content">
        <div class="logo-area">
          <div class="logo-icon">⚡</div>
          <h1 class="logo-title">GymLog</h1>
          <p class="logo-sub">Tu diario de entrenamiento</p>
        </div>

        <div class="home-actions">
          <button class="btn-primary" onclick="goTo('screen-add')">
            <span class="btn-icon">＋</span>
            Nuevo Entrenamiento
          </button>
          <button class="btn-secondary" onclick="goTo('screen-history')">
            <span class="btn-icon">📋</span>
            Ver Historial
          </button>
        </div>

        <div id="today-summary" class="today-summary hidden">
          <p class="summary-label">HOY</p>
          <div id="today-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PANTALLA: NUEVO ENTRENAMIENTO -->
  <div id="screen-add" class="screen">
    <div class="screen-header">
      <button class="back-btn" onclick="goTo('screen-home')">← Volver</button>
      <h2 class="screen-title">Nuevo Entrenamiento</h2>
    </div>
    <div class="screen-body">
      <p class="section-label">ELIGE GRUPO MUSCULAR</p>
      <div class="muscle-grid" id="muscle-grid"></div>
    </div>
  </div>

  <!-- PANTALLA: ELEGIR EJERCICIOS -->
  <div id="screen-exercises" class="screen">
    <div class="screen-header">
      <button class="back-btn" onclick="goTo('screen-add')">← Volver</button>
      <h2 class="screen-title" id="exercises-title">Ejercicios</h2>
    </div>
    <div class="screen-body">
      <p class="section-label">SELECCIONA EJERCICIOS</p>
      <div id="exercises-list" class="exercises-list"></div>
      <div class="sticky-bottom">
        <button class="btn-primary" id="start-workout-btn" onclick="startWorkout()">
          Iniciar Entrenamiento
        </button>
      </div>
    </div>
  </div>

  <!-- PANTALLA: ENTRENAMIENTO ACTIVO -->
  <div id="screen-workout" class="screen">
    <div class="screen-header workout-header">
      <div class="workout-meta">
        <span id="workout-muscle-label" class="workout-badge"></span>
        <span id="workout-timer" class="workout-timer">00:00</span>
      </div>
      <button class="btn-finish" onclick="finishWorkout()">Finalizar</button>
    </div>
    <div class="screen-body" id="workout-body"></div>
  </div>

  <!-- PANTALLA: HISTORIAL -->
  <div id="screen-history" class="screen">
    <div class="screen-header">
      <button class="back-btn" onclick="goTo('screen-home')">← Volver</button>
      <h2 class="screen-title">Historial</h2>
    </div>
    <div class="screen-body" id="history-body">
      <p class="empty-state">No hay entrenamientos registrados todavía.</p>
    </div>
  </div>

  <!-- PANTALLA: RESUMEN FINAL -->
  <div id="screen-summary" class="screen">
    <div class="screen-header">
      <h2 class="screen-title">¡Entrenamiento completado!</h2>
    </div>
    <div class="screen-body" id="summary-body"></div>
    <div class="sticky-bottom">
      <button class="btn-primary" onclick="goTo('screen-home')">Volver al inicio</button>
    </div>
  </div>

  <!-- MODAL: Imagen del ejercicio -->
  <div id="exercise-modal" class="modal hidden" onclick="closeModal()">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <img id="modal-img" src="" alt="Ejercicio" />
      <h3 id="modal-name"></h3>
      <p id="modal-desc"></p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
